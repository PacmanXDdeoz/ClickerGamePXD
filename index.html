<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="core.css">
</head>

<body>

    <svg version="1.1" xmlns="http://www.w3.org/2000/svg"
		xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="100%" height="100%" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
		<defs>
			<linearGradient id="bg">
				<stop offset="0%" style="stop-color:rgba(130, 158, 249, 0.06)"></stop>
				<stop offset="50%" style="stop-color:rgba(76, 190, 255, 0.6)"></stop>
				<stop offset="100%" style="stop-color:rgba(115, 209, 72, 0.2)"></stop>
			</linearGradient>
			<path id="wave" fill="url(#bg)" d="M-363.852,502.589c0,0,236.988-41.997,505.475,0
	s371.981,38.998,575.971,0s293.985-39.278,505.474,5.859s493.475,48.368,716.963-4.995v560.106H-363.852V502.589z" />
		</defs>
		<g>
			<use xlink:href='#wave' opacity=".3">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="10s"
          calcMode="spline"
          values="270 230; -334 180; 270 230"
          keyTimes="0; .5; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
			<use xlink:href='#wave' opacity=".6">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="8s"
          calcMode="spline"
          values="-270 230;243 220;-270 230"
          keyTimes="0; .6; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
			<use xlink:href='#wave' opacty=".9">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="6s"
          calcMode="spline"
          values="0 230;-140 200;0 230"
          keyTimes="0; .4; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
		</g>
	</svg>

    <div class="game-container">
        <header class="header">
            <div class="contTitle">
                <h1 class="title">¡Bienvenido a ClickerGame!</h1>
            </div>
            <div id="contHelps" class="cont-helps"></div>
        </header>

        <main class="main-content">
            <div class="div-bt-main">
                <button class="primary-button" id="btMain">
                    <span>Click Aquí!</span>
                </button>
            </div>

            <aside class="stats-container">
                <h2 class="stats-title">Stats</h2>
                <div class="sub-stats">
                    <p>Clicks: <span id="clicks">0</span></p>
                    <p>Contador: <span id="cont">0</span></p>
                    <p>AutoClicks: <span id="autoclicks">0</span></p>
                </div>
            </aside>

            <div style="display: none;">
                <div style="display: none;">
                    <iframe id="musicBack" width="0" height="0"
                        src="https://www.youtube.com/embed/AxFWtpaNa0E?autoplay=1&loop=1&playlist=AxFWtpaNa0E"
                        frameborder="0" allow="autoplay">
                    </iframe>
                </div>
            </div>
        </main>

        <footer class="footers">
            <div>
            </div>
            <div id="petsGacha" class="pets-area"></div>
        </footer>
    </div>
    <script src="index.js"></script>
</body>

</html>
